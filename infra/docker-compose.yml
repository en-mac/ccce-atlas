services:
  # ============================================================================
  # DATABASE: PostgreSQL 16 + PostGIS
  # ============================================================================
  postgres:
    image: postgis/postgis:16-3.4
    # Note: PostGIS official images don't support ARM64 yet
    # Running on ARM64 Macs via Rosetta emulation
    platform: linux/amd64
    container_name: ccce-atlas-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ccce_atlas}
      POSTGRES_USER: ${POSTGRES_USER:-ccce_atlas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ccce_atlas_dev}
      # Performance tuning for local development
      POSTGRES_SHARED_BUFFERS: ${POSTGRES_SHARED_BUFFERS:-256MB}
      POSTGRES_WORK_MEM: ${POSTGRES_WORK_MEM:-16MB}
      POSTGRES_EFFECTIVE_CACHE_SIZE: ${POSTGRES_EFFECTIVE_CACHE_SIZE:-768MB}
      POSTGRES_MAX_CONNECTIONS: ${POSTGRES_MAX_CONNECTIONS:-100}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/seed.sql:/docker-entrypoint-initdb.d/01-seed.sql
      # Mount reference data directory (read-only)
      - ../../ccce-platform/apps/map/public/data:/data:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ccce_atlas} -d ${POSTGRES_DB:-ccce_atlas}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - ccce-network
    restart: unless-stopped

  # ============================================================================
  # CACHE: Redis
  # ============================================================================
  redis:
    image: redis:7-alpine
    container_name: ccce-atlas-redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - ccce-network
    restart: unless-stopped

  # ============================================================================
  # TILE SERVER: pg_tileserv (serves PostGIS as .pbf vector tiles)
  # ============================================================================
  pg_tileserv:
    image: pramsey/pg_tileserv:latest
    # Note: pg_tileserv may not have ARM64 support
    # Running on ARM64 Macs via Rosetta emulation
    platform: linux/amd64
    container_name: ccce-atlas-pg-tileserv
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-ccce_atlas}:${POSTGRES_PASSWORD:-ccce_atlas_dev}@postgres:5432/${POSTGRES_DB:-ccce_atlas}
      # Enable CORS for local development
      TS_CORS_ORIGINS: ${TILESERV_CORS_ORIGINS:-*}
      # Cache control
      TS_HTTP_CACHE: ${TILESERV_HTTP_CACHE:-public, max-age=3600}
    ports:
      - "${TILESERV_PORT:-7800}:7800"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ccce-network
    restart: unless-stopped

  # ============================================================================
  # API: FastAPI Backend
  # ============================================================================
  api:
    build:
      context: ../services/api
      dockerfile: Dockerfile
    container_name: ccce-atlas-api
    environment:
      # Database
      DATABASE_URL: postgresql://${POSTGRES_USER:-ccce_atlas}:${POSTGRES_PASSWORD:-ccce_atlas_dev}@postgres:5432/${POSTGRES_DB:-ccce_atlas}
      # Redis
      REDIS_URL: redis://redis:6379/0
      # CORS
      CORS_ORIGINS: ${API_CORS_ORIGINS:-http://localhost:8080,http://localhost:5173}
      # Environment
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DEBUG: ${DEBUG:-True}
    volumes:
      # Hot reload for development
      - ../services/api:/app
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ccce-network
    restart: unless-stopped
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # ============================================================================
  # SPECIALTY TILES: FastAPI (AI depth maps + elevation proxy ONLY)
  # ============================================================================
  tiles:
    build:
      context: ../services/tiles
      dockerfile: Dockerfile
    container_name: ccce-atlas-tiles
    environment:
      # External APIs
      MAPBOX_TOKEN: ${MAPBOX_TOKEN}
      OPEN_TOPO_DATA_URL: ${OPEN_TOPO_DATA_URL:-https://api.opentopodata.org/v1}
      # Redis for caching
      REDIS_URL: redis://redis:6379/1
      # CORS
      CORS_ORIGINS: ${TILES_CORS_ORIGINS:-http://localhost:8080,http://localhost:5173}
      # Environment
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DEBUG: ${DEBUG:-True}
    volumes:
      # Hot reload for development
      - ../services/tiles:/app
    ports:
      - "${TILES_PORT:-8001}:8001"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - ccce-network
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload

  # ============================================================================
  # FRONTEND: Nginx serving static Cesium app
  # ============================================================================
  map:
    image: nginx:alpine
    container_name: ccce-atlas-map
    volumes:
      - ../apps/map/public:/usr/share/nginx/html:ro
      - ../apps/map/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${MAP_PORT:-8080}:80"
    networks:
      - ccce-network
    restart: unless-stopped
    depends_on:
      - api
      - tiles
      - pg_tileserv

# ============================================================================
# NETWORKS
# ============================================================================
networks:
  ccce-network:
    driver: bridge
    name: ccce-atlas-network

# ============================================================================
# VOLUMES
# ============================================================================
volumes:
  postgres_data:
    name: ccce-atlas-postgres-data
  redis_data:
    name: ccce-atlas-redis-data
