[pytest]
# Pytest configuration for CCCE Atlas API tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Asyncio mode
asyncio_mode = auto

# Test paths
testpaths = tests

# Markers
markers =
    asyncio: mark test as requiring asyncio
    integration: mark test as integration test
    unit: mark test as unit test
